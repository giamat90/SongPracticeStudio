name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 1b. Sync version from git tag into all manifest files ────────────
      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Stamping version $VERSION"
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json
          jq --arg v "$VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json
          sed -i "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml

      # ── 2. Node.js ───────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # ── 3. Rust ──────────────────────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # ── 4. Python ────────────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ── 5. Install Python sidecar dependencies ────────────────────────────
      - name: Install Python dependencies
        working-directory: sidecar
        run: |
          pip install --upgrade pip
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install demucs librosa soundfile numpy yt-dlp pyinstaller

      # ── 6. Freeze the Python sidecar with PyInstaller ────────────────────
      - name: Build Python sidecar (PyInstaller)
        working-directory: sidecar
        shell: bash
        run: |
          pyinstaller main.py \
            --onefile \
            --name song-practice-studio-sidecar-x86_64-pc-windows-msvc \
            --hidden-import=demucs \
            --hidden-import=demucs.api \
            --hidden-import=demucs.pretrained \
            --hidden-import=librosa \
            --hidden-import=soundfile \
            --hidden-import=numpy \
            --collect-data=demucs \
            --collect-all=yt_dlp \
            --noconfirm \
            --clean

      # ── 7. Stage sidecar binary ───────────────────────────────────────────
      - name: Stage sidecar binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force src-tauri/binaries | Out-Null
          Copy-Item sidecar/dist/song-practice-studio-sidecar-x86_64-pc-windows-msvc.exe src-tauri/binaries/

      # ── 8. Install Node dependencies ──────────────────────────────────────
      - name: Install frontend dependencies
        run: npm ci

      # ── 9. Build the Tauri app (NSIS installer) and publish to the release ─
      # tauri-action signs the installer + generates the updater manifest
      # fragment for this platform, then uploads both to the (draft) GitHub
      # Release for the tag. The finalize job undrafts once every platform
      # has contributed its fragment, so latest.json is never partial.
      - name: Build Tauri app (NSIS) and publish
        uses: tauri-apps/tauri-action@v0
        env:
          CARGO_HTTP_MULTIPLEXING: false
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Song Practice Studio ${{ github.ref_name }}'
          releaseBody: See CHANGELOG for details.
          releaseDraft: true
          prerelease: false
          updaterJsonPreferNsis: true
          args: --bundles nsis

      # ── 10. Smoke test ────────────────────────────────────────────────────
      - name: Smoke test
        shell: pwsh
        run: |
          $installer = Get-ChildItem src-tauri/target/release/bundle/nsis -Filter "*.exe" | Select-Object -First 1
          if (-not $installer) {
            Write-Host "NSIS installer not found — build may have failed"
            exit 1
          }
          Write-Host "NSIS installer built: $($installer.Name)"

          $binary = "src-tauri/target/release/song-practice-studio.exe"
          Write-Host "Launching: $binary"
          $proc = Start-Process -FilePath $binary -PassThru
          Start-Sleep 15
          if (-not $proc.HasExited) {
            Write-Host "App is running (PID $($proc.Id)) — smoke test passed"
            $proc.Kill()
          } else {
            Write-Host "App exited immediately (exit code $($proc.ExitCode)) — smoke test failed"
            exit 1
          }

  build-macos:
    runs-on: macos-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 1b. Sync version from git tag into all manifest files ────────────
      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Stamping version $VERSION"
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json
          jq --arg v "$VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json
          sed -i '' "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml

      # ── 2. Node.js ───────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # ── 3. Rust ──────────────────────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # ── 4. Python ────────────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ── 5. Install Python sidecar dependencies ────────────────────────────
      - name: Install Python dependencies
        working-directory: sidecar
        run: |
          pip install --upgrade pip
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install demucs librosa soundfile numpy yt-dlp pyinstaller

      # ── 6. Freeze the Python sidecar with PyInstaller ────────────────────
      - name: Build Python sidecar (PyInstaller)
        working-directory: sidecar
        run: |
          pyinstaller main.py \
            --onefile \
            --name song-practice-studio-sidecar-aarch64-apple-darwin \
            --hidden-import=demucs \
            --hidden-import=demucs.api \
            --hidden-import=demucs.pretrained \
            --hidden-import=librosa \
            --hidden-import=soundfile \
            --hidden-import=numpy \
            --collect-data=demucs \
            --collect-all=yt_dlp \
            --noconfirm \
            --clean

      # ── 7. Stage sidecar binary ───────────────────────────────────────────
      - name: Stage sidecar binary
        run: |
          mkdir -p src-tauri/binaries
          cp sidecar/dist/song-practice-studio-sidecar-aarch64-apple-darwin src-tauri/binaries/

      # ── 8. Install Node dependencies ──────────────────────────────────────
      - name: Install frontend dependencies
        run: npm ci

      # ── 9. Build the Tauri app (.dmg + .app) and publish to the release ──
      - name: Build Tauri app and publish
        uses: tauri-apps/tauri-action@v0
        env:
          CARGO_HTTP_MULTIPLEXING: false
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Code signing (optional — omit if distributing outside Mac App Store)
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Song Practice Studio ${{ github.ref_name }}'
          releaseBody: See CHANGELOG for details.
          releaseDraft: true
          prerelease: false

      # ── 10. Smoke test ────────────────────────────────────────────────────
      - name: Smoke test .dmg
        run: |
          DMG=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" | head -1)
          echo "Mounting: $DMG"
          hdiutil attach "$DMG" -mountpoint /tmp/sps-dmg -nobrowse -quiet
          APP=$(find /tmp/sps-dmg -name "*.app" -maxdepth 1 | head -1)
          BINARY=$(find "$APP/Contents/MacOS" -maxdepth 1 -type f | head -1)
          echo "Launching binary: $BINARY"
          "$BINARY" &
          APP_PID=$!
          sleep 15
          if kill -0 $APP_PID 2>/dev/null; then
            echo "App is running (PID $APP_PID) — smoke test passed"
            kill $APP_PID
            wait $APP_PID 2>/dev/null || true
          else
            echo "App exited immediately — smoke test failed"
            hdiutil detach /tmp/sps-dmg -quiet || true
            exit 1
          fi
          hdiutil detach /tmp/sps-dmg -quiet || true

  finalize:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Undraft the release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --draft=false --repo ${{ github.repository }}
